name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-build:
    name: Build distributions and attach artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build distributions
        run: |
          python -m build

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Upload distributions to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  testpypi-publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: release-build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/magicprobe
    permissions:
      id-token: write
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: testpypi-publish
    environment:
      name: pypi
      url: https://pypi.org/p/magicprobe
    permissions:
      id-token: write
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
